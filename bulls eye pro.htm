<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bull's Eye WMSI FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align:center;
    margin:0;
    padding:28px 20px 36px;
    background:#f5f7fa;
    color:#1f2937;
}

.page-header {
    max-width:1100px;
    margin:0 auto 22px;
}

.page-title {
    margin:0 0 18px;
    font-size:28px;
    font-weight:700;
    line-height:1.2;
}

.toolbar {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    max-width:980px;
    margin:0 auto;
}

.container {
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    max-width:1100px;
    margin:0 auto;
}

.panel {
    text-align:center;
    background:#fff;
    border-radius:18px;
    padding:18px 18px 16px;
    box-shadow:0 10px 24px rgba(15, 23, 42, 0.08);
}

svg { width:350px; height:350px; }

.segment {
    stroke:#333;
    stroke-width:1;
    cursor:pointer;
}

text {
    font-size:11px;
    pointer-events:none;
}

button {
    margin:0;
    padding:10px 16px;
    border:1px solid #d0d7e2;
    border-radius:999px;
    background:#fff;
    color:#1f2937;
    font-weight:600;
    cursor:pointer;
    transition:background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
}

button:hover {
    background:#eef2f7;
    border-color:#b8c2d1;
    transform:translateY(-1px);
}

.output {
    font-weight:bold;
    max-width:300px;
    margin:auto;
}
</style>
</head>

<body>

<div class="page-header">
    <h3 class="page-title">Contratilidade segmentar do ventrículo esquerdo</h3>
    <div class="toolbar">
        <button onclick="toggleModo()">Alternar modo Eco Estresse</button>
        <button id="btnModelo" onclick="toggleModeloSegmentos()">Usar modelo 16 segmentos</button>
        <button onclick="copiarAmbos()">Copiar diagramas</button>
        <button onclick="copiarComTextos()">Copiar diagramas com textos</button>
        <button onclick="resetar()">Resetar segmentos</button>
    </div>
</div>

<div id="container" class="container"></div>

<script>

// ===== CONFIG =====
const states = [
{n:"normal",score:1,c:"#4CAF50"},
{n:"hipocinesia",score:2,c:"#FFC107"},
{n:"acinesia",score:3,c:"#F44336"},
{n:"discinesia",score:4,c:"#0D47A1"}, // azul escuro
{n:"aneurismático",score:5,c:"#9E9E9E"} // cinza
];

// ===== SEGMENTOS ASE CORRETOS =====
const segmentos = [
{parede:"anterior",nivel:"basal"},      //1
{parede:"ântero-septal",nivel:"basal"}, //2
{parede:"ínfero-septal",nivel:"basal"}, //3
{parede:"inferior",nivel:"basal"},      //4
{parede:"ínfero-lateral",nivel:"basal"},//5
{parede:"ântero-lateral",nivel:"basal"},//6

{parede:"anterior",nivel:"médio"},      //7
{parede:"ântero-septal",nivel:"médio"},        //8
{parede:"ínfero-septal",nivel:"médio"},        //9
{parede:"inferior",nivel:"médio"},      //10
{parede:"ínfero-lateral",nivel:"médio"},       //11
{parede:"ântero-lateral",nivel:"médio"},       //12

{parede:"anterior",nivel:"apical"},     //13
{parede:"septal",nivel:"apical"},       //14
{parede:"inferior",nivel:"apical"},     //15
{parede:"lateral",nivel:"apical"},      //16

{parede:"apical",nivel:"apical"}        //17
];

let stressMode = false;
let usar17Segmentos = true;

// ===== BUILD =====

function criarPainel(titulo,id){
    let div=document.createElement("div");
    div.className="panel";
    div.id=id;

    div.innerHTML=`
        <h4>${titulo}</h4>
        <div id="cap_${id}">
            <svg viewBox="0 0 400 400"></svg>
        </div>
        <br>
        <p class="output" id="out_${id}"></p>
        <button onclick="copiarTexto('${id}')">Copiar texto</button>
    `;

    document.getElementById("container").appendChild(div);

    buildBullseye(div.querySelector("svg"), id);
}

function buildBullseye(svg, id){

let state=new Array(17).fill(0);
svg.state=state;

function polar(r,a){return{x:200+r*Math.cos(a),y:200+r*Math.sin(a)};}

function arc(r1,r2,a1,a2){
let p1=polar(r1,a1),p2=polar(r2,a1),p3=polar(r2,a2),p4=polar(r1,a2);
let large=(a2-a1)>Math.PI?1:0;
return `M${p1.x} ${p1.y} L${p2.x} ${p2.y}
A${r2} ${r2} 0 ${large} 1 ${p3.x} ${p3.y}
L${p4.x} ${p4.y}
A${r1} ${r1} 0 ${large} 0 ${p1.x} ${p1.y}Z`;
}

function ring(r1,r2,n,start){
let step=2*Math.PI/n;

for(let i=0;i<n;i++){
// ajuste de angulo para iniciar no topo e centralizar
let a1=i*step - Math.PI/2 - step/2;
let a2=a1+step;
// remapeia index para ordem anti-horaria
let idx=start + ((i===0) ? 0 : n-i);

let path=document.createElementNS("http://www.w3.org/2000/svg","path");
path.setAttribute("d",arc(r1,r2,a1,a2));
path.setAttribute("fill",states[0].c);
path.setAttribute("class","segment");

path.onclick=()=>{
    state[idx]=(state[idx]+1)%states.length;
    path.setAttribute("fill",states[state[idx]].c);
    gerarLaudo(id);
};

svg.appendChild(path);

// número
let m=(a1+a2)/2;
let r=(r1+r2)/2;
let p=polar(r,m);

let t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",p.x);
t.setAttribute("y",p.y);
t.setAttribute("text-anchor","middle");
t.textContent=idx+1;

svg.appendChild(t);
}
}

ring(120,180,6,0);
ring(60,120,6,6);
ring(20,60,4,12);

if(usar17Segmentos){
// apex
let c=document.createElementNS("http://www.w3.org/2000/svg","circle");
c.setAttribute("cx",200);
c.setAttribute("cy",200);
c.setAttribute("r",20);
c.setAttribute("fill",states[0].c);

c.onclick=()=>{
state[16]=(state[16]+1)%states.length;
c.setAttribute("fill",states[state[16]].c);
gerarLaudo(id);
};

svg.appendChild(c);

// 17
let t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",200);
t.setAttribute("y",200);
t.setAttribute("text-anchor","middle");
t.textContent="17";
svg.appendChild(t);
}
}

// ===== LAUDO =====

function gerarLaudo(id){

let svg=document.querySelector("#"+id+" svg");
let state=svg.state;
let totalSegmentos=usar17Segmentos ? 17 : 16;

let grupos={hipocinesia:{},acinesia:{},discinesia:{},aneurismático:{}};
let soma=0;

for(let i=0;i<totalSegmentos;i++){
let s=states[state[i]];
soma+=s.score;

if(s.n==="normal") continue;

let seg=segmentos[i];

if(!grupos[s.n][seg.parede]) grupos[s.n][seg.parede]=[];
grupos[s.n][seg.parede].push(seg.nivel);
}

let wmsi=(soma/totalSegmentos).toFixed(2);

function fmt(g){
let txt=[];
for(let p in g){
let niv=[...new Set(g[p])];
if(p==="apical"){
txt.push("segmento apical");
continue;
}
txt.push(`parede ${p} (${niv.join(" e ")})`);
}
return txt.join(", ");
}

let out="";

if(Object.keys(grupos.hipocinesia).length)
out+="Hipocinesia em "+fmt(grupos.hipocinesia)+".\n";

if(Object.keys(grupos.acinesia).length)
out+="Acinesia em "+fmt(grupos.acinesia)+".\n";

if(Object.keys(grupos.discinesia).length)
out+="Discinesia em "+fmt(grupos.discinesia)+".\n";

if(Object.keys(grupos["aneurismático"]).length)
out+="Aneurismático em "+fmt(grupos["aneurismático"])+".\n";

if (wmsi == 1)
    out+="Contratilidade segmentar normal.\n";
out+="WMSI = "+wmsi+".";


document.getElementById("out_"+id).innerText=out;
}

function copiarTexto(id){
navigator.clipboard.writeText(document.getElementById("out_"+id).innerText);
alert("Texto copiado");
}

// ===== RESET =====

function resetar(){
document.querySelectorAll("svg").forEach(svg=>{
    let state=svg.state;
    for(let i=0;i<state.length;i++) state[i]=0;

    svg.querySelectorAll("path, circle").forEach(el=>{
        el.setAttribute("fill",states[0].c);
    });

    let id=svg.parentElement.id.replace("cap_","");
    gerarLaudo(id);
});
}

// ===== CLIPBOARD =====

function copiarParaClipboard(incluirTextos){
let captura=document.createElement("div");
captura.style.display="flex";
captura.style.justifyContent="center";
captura.style.gap="40px";
captura.style.flexWrap="wrap";
captura.style.background="#fff";
captura.style.padding="8px";

document.querySelectorAll(".panel").forEach(panel=>{
    let bloco=document.createElement("div");
    bloco.className="panel";
    let titulo=panel.querySelector("h4");
    let cap=panel.querySelector("[id^='cap_']");

    if(titulo) bloco.appendChild(titulo.cloneNode(true));

    if(incluirTextos){
        let out=panel.querySelector(".output");

        if(cap) bloco.appendChild(cap.cloneNode(true));
        if(out) bloco.appendChild(out.cloneNode(true));
    }else{
        if(cap) bloco.appendChild(cap.cloneNode(true));
    }

    if(bloco.children.length) captura.appendChild(bloco);
});

captura.style.position="fixed";
captura.style.left="-99999px";
document.body.appendChild(captura);

html2canvas(captura,{backgroundColor:"#ffffff"}).then(canvas=>{
canvas.toBlob(blob=>{
navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
alert(incluirTextos ? "Diagramas com textos copiados" : "Diagramas copiados");
document.body.removeChild(captura);
});
});
}

function copiarAmbos(){
copiarParaClipboard(false);
}

function copiarComTextos(){
copiarParaClipboard(true);
}

// ===== MODO =====

function atualizarBotaoModelo(){
let botao=document.getElementById("btnModelo");
if(botao) botao.innerText=usar17Segmentos ? "Usar modelo 16 segmentos" : "Usar modelo 17 segmentos";
}

function renderPaines(){
let c=document.getElementById("container");
c.innerHTML="";

if(stressMode){
criarPainel("Repouso","rep");
criarPainel("Pico de Estresse","est");
}else{
criarPainel("Repouso","single");
}

atualizarBotaoModelo();

document.querySelectorAll("svg").forEach(svg=>{
    let id=svg.parentElement.id.replace("cap_","");
    gerarLaudo(id);
});
}

function toggleModo(){
stressMode=!stressMode;
renderPaines();
}

function toggleModeloSegmentos(){
usar17Segmentos=!usar17Segmentos;
renderPaines();
}

renderPaines();

</script>

</body>
</html>
